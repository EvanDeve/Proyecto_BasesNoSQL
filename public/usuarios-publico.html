<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TicoRecicla Connect - Consulta de usuarios</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>

<body>

  
  <div id="navbar-root"></div>

  <section class="section-block">
    <div class="container">
      
      <div class="text-center mb-5">
        <h2 class="section-title">Usuarios Registrados</h2>
        <p class="section-subtitle">
          Consulta de usuarios creados en el sistema
        </p>
      </div>

      <div class="d-flex justify-content-center mb-4">
        <a href="./usuarios.html" class="btn btn-outline-primary">
          <i class="bi bi-person-plus me-2"></i>Ir a añadir usuarios
        </a>
      </div>

   
      <div id="usuarios-list" class="row g-4"></div>

    </div>
  </section>


  <div id="footer-root"></div>


  <script src="./includes/globalNavbar.js"></script>
  <script src="./includes/footer.js"></script>

  <script>
    (function renderUsuariosPublicos() {
      const container = document.getElementById("usuarios-list");

      function getUsuarios() {
        return JSON.parse(localStorage.getItem("usuarios")) || [];
      }

      function render() {
        const usuarios = getUsuarios();

        if (usuarios.length === 0) {
          container.innerHTML = `
            <div class="col-12 text-center">
              <p class="text-muted">No hay usuarios registrados todavía.</p>
            </div>
          `;
          return;
        }

        container.innerHTML = usuarios.map(user => `
          <div class="col-md-6 col-lg-4">
            <div class="card h-100 shadow-sm">
              <div class="card-body">
                <h5 class="card-title">${user.nombre || "Sin nombre"}</h5>
                <p class="card-text mb-1">
                  <strong>Email:</strong> ${user.email || "N/A"}
                </p>
                <p class="card-text mb-1">
                  <strong>Tipo:</strong> ${user.tipo || "Usuario"}
                </p>
              </div>
            </div>
          </div>
        `).join("");
      }

      render();
    })();
  </script>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
